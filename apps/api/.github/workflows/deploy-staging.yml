name: 🚀 Deploy to Staging

on:
  push:
    branches: [develop, staging] # triggers when code is pushed to staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 SSH into server and deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e  # Exit on any error
            cd /opt/app/preprod/avir/avirtrekkersBackend
            
            # Show current status
            echo "📊 Current git status:"
            git status
            echo "📌 Current commit:"
            git log -1 --oneline
            
            # Verify remote configuration
            echo "🔗 Remote configuration:"
            git remote -v
            echo "📍 Current branch tracking:"
            git branch -vv
            
            # Check what's actually on the remote (bypass cached refs)
            echo "🌐 Checking remote staging branch directly (bypassing cache)..."
            REMOTE_REF=$(git ls-remote origin staging | awk '{print $1}' | head -1)
            echo "Remote staging commit (from ls-remote): $REMOTE_REF"
            
            # Prune stale remote references
            echo "🧹 Pruning stale remote references..."
            git remote prune origin || true
            
            # Update all remote refs
            echo "🔄 Updating all remote refs..."
            git remote update origin --prune || true
            
            # Fetch latest changes from remote (with prune to remove stale refs)
            echo "📥 Fetching latest changes..."
            git fetch origin --prune --force
            
            # Fetch the specific branch to ensure we have latest
            echo "📥 Fetching staging branch specifically..."
            git fetch origin staging --force
            
            # Verify we got the right commit
            FETCHED_REF=$(git rev-parse origin/staging 2>/dev/null || echo "none")
            echo "Fetched staging commit: $FETCHED_REF"
            if [ "$REMOTE_REF" != "none" ] && [ "$FETCHED_REF" != "$REMOTE_REF" ] && [ "$REMOTE_REF" != "" ]; then
              echo "⚠️  WARNING: Fetched commit doesn't match remote! Retrying fetch..."
              sleep 2
              git fetch origin staging --force
              FETCHED_REF=$(git rev-parse origin/staging)
              echo "After retry, fetched commit: $FETCHED_REF"
            fi
            
            # Show remote commit before reset
            echo "📌 Remote staging commit (before reset):"
            git log -1 origin/staging --oneline || echo "No remote commits"
            REMOTE_HASH_BEFORE=$(git rev-parse origin/staging 2>/dev/null || echo "none")
            echo "Remote hash: $REMOTE_HASH_BEFORE"
            
            # Show what will be pulled
            echo "📋 Changes to be pulled:"
            git log HEAD..origin/staging --oneline || echo "No new changes"
            
            # Compare commit hashes before reset
            LOCAL_HASH=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "🔍 Commit comparison (before reset):"
            echo "  Local:  $LOCAL_HASH"
            echo "  Remote: $REMOTE_HASH_BEFORE"
            
            # Ensure we're on the correct branch
            echo "🔀 Checking out staging branch..."
            git checkout staging || git checkout -b staging origin/staging
            
            # Update remote tracking
            echo "🔗 Setting up remote tracking..."
            git branch --set-upstream-to=origin/staging staging || true
            
            # Reset to match remote exactly (removes local changes)
            echo "🔄 Resetting to match remote staging branch..."
            git reset --hard origin/staging
            
            # Clean untracked files and directories
            echo "🧹 Cleaning untracked files..."
            git clean -fd
            
            # Verify we're up to date
            echo "✅ Verifying latest commit:"
            git log -1 --oneline
            FINAL_LOCAL_HASH=$(git rev-parse HEAD)
            FINAL_REMOTE_HASH=$(git rev-parse origin/staging)
            echo "🔍 Final commit comparison:"
            echo "  Local HEAD:  $FINAL_LOCAL_HASH"
            echo "  Remote HEAD: $FINAL_REMOTE_HASH"
            if [ "$FINAL_LOCAL_HASH" = "$FINAL_REMOTE_HASH" ]; then
              echo "✅ Successfully synced! Local and remote commits match."
            else
              echo "⚠️  WARNING: Local and remote commits don't match!"
              echo "   This might indicate a sync issue. Continuing anyway..."
            fi
            
            # Show final status
            echo "📊 Final git status:"
            git status
            
            # Run deployment script
            echo "🚀 Running deployment script..."
            sh deploy-staging.sh
