# Production stack — all 3 services run as containers.
# Host nginx handles SSL termination and proxies to container ports:
#   avirtrekkers.com       → localhost:3004 (user-site)
#   admin.avirtrekkers.com → localhost:3005 (admin-portal)
#   /api/ on both domains  → localhost:4002 (api)
#
# GITHUB_OWNER is substituted by envsubst in CI before this file is copied to VPS.
# api.env is written to /opt/avir-trekkers/api.env by the CI pipeline from GitHub Secrets.

services:

  # ── Express API ────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_OWNER}/avir-trekkers/api:latest
    container_name: avir-prod-api
    ports:
      - "4002:4001"
    env_file: /opt/avir-trekkers/api.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── User Site (React/Vite → nginx:alpine) ─────────────────────────────────
  user-site:
    image: ghcr.io/${GITHUB_OWNER}/avir-trekkers/user:latest
    container_name: avir-prod-user
    ports:
      - "3004:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Admin Portal (React/Vite → nginx:alpine) ──────────────────────────────
  admin-portal:
    image: ghcr.io/${GITHUB_OWNER}/avir-trekkers/admin:latest
    container_name: avir-prod-admin
    ports:
      - "3005:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: avir-production
    driver: bridge
