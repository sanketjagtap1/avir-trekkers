    ##############################################
    # HTTPS Block: technootales.in
    ##############################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name technootales.in www.technootales.in;
    ssl_certificate /etc/letsencrypt/live/technootales.in-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/technootales.in-0001/privkey.pem; # managed by Certbot
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/technootales;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

       location /api/ {
    proxy_pass http://localhost:5000/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}

        ##############################################
        # loophole — WebSocket control plane
        # Clients connect here: wss://technootales.in/loophole
        ##############################################
        location /loophole {
            proxy_pass         http://127.0.0.1:3100;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Keep WebSocket connections alive for hours
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        error_page 404 /custom_404.html;
        location = /custom_404.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 500 502 503 504 /custom_50x.html;
        location = /custom_50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        include /etc/nginx/default.d/*.conf;
    


}

