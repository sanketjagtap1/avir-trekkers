    ##############################################
    # HTTP → HTTPS redirect for *.technootales.in
    # (separate block — wildcard can't be added to
    #  the existing combined redirect block above)
    ##############################################
    server {
    if ($host ~ ^[^.]+\.technootales\.in$) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        listen [::]:80;
        server_name *.technootales.in;
        return 301 https://$host$request_uri;
    

}

    ##############################################
    # HTTPS Block: api.technootales.in
    # loophole NestJS API (auth + tunnel ownership)
    # — must come BEFORE the *.technootales.in
    # wildcard block so it wins on specificity.
    ##############################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.technootales.in;

        ssl_certificate     /etc/letsencrypt/live/technootales.in-0001/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/technootales.in-0001/privkey.pem; # managed by Certbot
        ssl_session_cache   shared:SSL:1m;
        ssl_session_timeout 10m;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Allow reasonable request bodies (signup/signin are tiny, but headroom doesn't hurt)
        client_max_body_size 2M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }

    ##############################################
    # HTTPS Block: *.technootales.in
    # loophole tunnel traffic — each subdomain is
    # a live tunnel (e.g. sonar.technootales.in)
    ##############################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name *.technootales.in;

        ssl_certificate     /etc/letsencrypt/live/technootales.in-0001/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/technootales.in-0001/privkey.pem; # managed by Certbot
        ssl_session_cache   shared:SSL:1m;
        ssl_session_timeout 10m;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Allow large uploads through tunnels
        client_max_body_size 100M;

        # Fix mixed-content warnings: upgrade http:// sub-requests to https://
        add_header Content-Security-Policy   "upgrade-insecure-requests" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://127.0.0.1:3100;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    
}

