user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    include             /etc/nginx/conf.d/*.conf;

    ##############################################
    # Redirect HTTP to HTTPS for all domains
    ##############################################
    server {
    if ($host = www.technootales.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = technootales.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.algoetf.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = algoetf.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.preprod.algoetf.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = preprod.algoetf.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.avirtrekkers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = avirtrekkers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.staging.avirtrekkers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = staging.avirtrekkers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = admin-staging.avirtrekkers.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.sanket-jagtap.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = sanket-jagtap.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
        listen [::]:80;
        server_name
            algoetf.in www.algoetf.in
            preprod.algoetf.in www.preprod.algoetf.in
            technootales.in www.technootales.in
            avirtrekkers.com www.avirtrekkers.com
            staging.avirtrekkers.com www.staging.avirtrekkers.com
            admin-staging.avirtrekkers.com
            sanket-jagtap.in www.sanket-jagtap.in;

        # ACME challenge served before HTTPS redirect (certbot auto-renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    















}

    ##############################################
    # HTTPS Block: algoetf.in
    ##############################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name algoetf.in www.algoetf.in;
    ssl_certificate /etc/letsencrypt/live/algoetf.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/algoetf.in/privkey.pem; # managed by Certbot
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/algoetf;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://localhost:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        error_page 404 /custom_404.html;
        location = /custom_404.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 500 502 503 504 /custom_50x.html;
        location = /custom_50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        include /etc/nginx/default.d/*.conf;
    

}

