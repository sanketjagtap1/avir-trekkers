sonar.projectKey=avir-trekkers
sonar.projectName=Avir Trekkers
sonar.sources=apps/api,apps/user-site/src,apps/admin-portal/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,apps/user-site-legacy/**
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Skip JRE download from SonarQube server — use the scanner's bundled JRE instead
# Fixes 504 timeout on /api/v2/analysis/jres endpoint
sonar.scanner.skipJreProvisioning=true
